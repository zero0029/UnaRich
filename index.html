<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>UnaRich - 記帳</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png" type="image/png" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body class="page-home">
    <header class="app-header">
      <h1>UnaRich 📝</h1>
    </header>

    <main class="container">
      <section class="card">
        <div class="type-switcher">
          <button id="btn-exp" class="type-btn active-exp" onclick="setType('支出')">支出</button>
          <button id="btn-inc" class="type-btn" onclick="setType('收入')">收入</button>
        </div>

        <div class="input-group">
          <label>日期</label>
          <input type="date" id="record-date" />
        </div>

        <div class="input-group">
          <label>金額</label>
          <input type="number" id="amount" placeholder="0" inputmode="decimal" />
        </div>

        <div class="input-group">
          <label>分類</label>
          <select id="category"></select>
        </div>

        <div class="input-group">
          <label>備註</label>
          <input type="text" id="note" placeholder="寫點什麼吧..." />
        </div>

        <button class="save-btn" onclick="addRecord()">🌟 儲存這筆紀錄</button>
      </section>

      <section class="card">
        <h2 style="margin-bottom: 15px">最近紀錄 🕒</h2>
        <div id="recent-list"></div>
      </section>
    </main>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item active">
        <span class="nav-icon">📝</span>
        <p>記帳</p>
      </a>
      <a href="charts.html" class="nav-item">
        <span class="nav-icon">📊</span>
        <p>報表</p>
      </a>
      <a href="settings.html" class="nav-item">
        <span class="nav-icon">⚙️</span>
        <p>設定</p>
      </a>
    </nav>

    <div id="toast" class="toast"></div>

    <div id="custom-modal" class="modal-overlay">
      <div class="modal-card">
        <div class="modal-icon">🥺</div>
        <h3 id="modal-title">確定要刪除嗎？</h3>
        <p id="modal-msg">刪除後紀錄就找不回來囉！</p>
        <div class="modal-btns">
          <button onclick="closeModal()" class="modal-btn-cancel">先不要</button>
          <button id="modal-confirm-btn" class="modal-btn-confirm">確定刪除</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
