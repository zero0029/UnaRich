<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>UnaRich - 記帳</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body class="page-home">
    <header class="app-header"><h1>UnaRich 📝</h1></header>
    <main class="container">
      <section class="card">
        <div class="type-switcher">
          <button id="btn-exp" class="type-btn active-exp" onclick="setType('支出')">支出</button>
          <button id="btn-inc" class="type-btn" onclick="setType('收入')">收入</button>
        </div>
        <input type="date" id="record-date" />
        <input type="number" id="amount" placeholder="金額" inputmode="decimal" />
        <select id="category"></select>
        <input type="text" id="note" placeholder="備註 (選填)" />
        <button class="save-btn" onclick="addRecord()">🌟 儲存這筆紀錄</button>
      </section>
      <section class="card">
        <h2>最近紀錄 🕒</h2>
        <div id="recent-list"></div>
      </section>
    </main>
    <div id="nav-placeholder"></div>
    <div id="toast" class="toast"></div>
    <script src="script.js"></script>
  </body>
</html>
