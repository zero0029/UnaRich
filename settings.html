<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>UnaRich - 設定</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="page-settings">
    <header class="app-header"><h1>設定 ⚙️</h1></header>
    <main class="container">
      <section class="card">
        <h2>外觀設定</h2>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px">
          <span>🌙 深色模式</span>
          <button id="dark-mode-toggle" class="nav-btn" onclick="toggleDarkMode()" style="width: 80px; border-radius: 10px">開啟</button>
        </div>
      </section>
      <section class="card" style="text-align: center">
        <p>UnaRich v1.0</p>
        <p style="font-size: 12px; color: var(--text-sub)">資料儲存於本地瀏覽器</p>
      </section>
    </main>
    <div id="nav-placeholder"></div>
    <script src="script.js"></script>
  </body>
</html>
